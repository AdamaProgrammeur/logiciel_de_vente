{% extends "frontend_app/base.html" %}
{% block title %}Fournisseurs{% endblock %}

{% block content %}
<style>
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.page-header h2 { font-weight:700; color:#1e3c72; margin:0; }
.search-box { position:relative; }
.search-box input { padding-left:38px; border-radius:20px; border:1px solid #dee2e6; width:240px; height:38px; font-size:0.88rem; }
.search-box i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#aaa; }
.btn-add { background:linear-gradient(135deg,#1e3c72,#2a5298); color:white; border:none; border-radius:10px; padding:8px 18px; font-size:0.88rem; display:flex; align-items:center; gap:6px; transition:0.2s; }
.btn-add:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(30,60,114,0.3); color:white; }
.table-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.07); overflow:hidden; }
.table-card thead th { background:#1e3c72; color:white; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px; padding:12px 16px; border:none; }
.table-card tbody td { padding:11px 16px; vertical-align:middle; font-size:0.88rem; border-bottom:1px solid #f0f0f0; }
.table-card tbody tr:hover { background:#f8f9ff; }
.table-card tbody tr:last-child td { border-bottom:none; }
.btn-icon { width:32px; height:32px; border-radius:8px; border:none; display:inline-flex; align-items:center; justify-content:center; font-size:0.85rem; transition:0.2s; cursor:pointer; }
.btn-icon:hover { transform:scale(1.1); }
.btn-edit { background:#fff3cd; color:#856404; }
.btn-edit:hover { background:#ffc107; color:white; }
.btn-del { background:#fde8e8; color:#c0392b; }
.btn-del:hover { background:#e74c3c; color:white; }
.empty-row td { text-align:center; padding:30px; color:#aaa; font-size:0.9rem; }
</style>

<div class="page-header">
    <h2><i class="bi bi-truck me-2" style="color:#2a5298;"></i>Fournisseurs</h2>
    <div class="d-flex gap-2 align-items-center flex-wrap">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un fournisseur..." oninput="filterTable()">
        </div>
        <button class="btn-add" data-bs-toggle="modal" data-bs-target="#fournisseurModal">
            <i class="bi bi-plus-circle-fill"></i> Nouveau fournisseur
        </button>
    </div>
</div>

<div class="table-card">
    <div style="overflow-x:auto;">
    <table class="table mb-0" style="min-width:500px;">
        <thead>
            <tr>
                <th>#</th>
                <th>Nom</th>
                <th>Téléphone</th>
                <th>Adresse</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="fournisseurs-list"></tbody>
    </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="fournisseurModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:14px;border:none;">
      <div class="modal-header" style="background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;border-radius:14px 14px 0 0;">
        <h5 class="modal-title"><i class="bi bi-truck me-2"></i><span id="modalTitle">Nouveau fournisseur</span></h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="fournisseurForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom</label>
            <input type="text" class="form-control" name="nom" required placeholder="Nom du fournisseur">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Téléphone</label>
            <input type="text" class="form-control" name="telephone" placeholder="+224...">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Adresse</label>
            <input type="text" class="form-control" name="adresse" placeholder="Adresse">
          </div>
          <button type="submit" class="btn w-100" style="background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;border-radius:8px;">
            <i class="bi bi-check-circle me-1"></i> Enregistrer
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
let allFournisseurs = [];

function getCSRFToken() {
    return document.cookie.split('; ').find(r => r.startsWith('csrftoken'))?.split('=')[1];
}

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#fournisseurs-list tr[data-search]').forEach(r => {
        r.style.display = r.dataset.search.includes(q) ? '' : 'none';
    });
}

function loadFournisseurs() {
    fetch('/api/fournisseurs/')
    .then(r => r.json())
    .then(data => {
        allFournisseurs = data;
        const tbody = document.getElementById('fournisseurs-list');
        tbody.innerHTML = '';
        if(!data.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Aucun fournisseur trouvé</td></tr>'; return; }
        data.forEach(f => {
            const tr = document.createElement('tr');
            tr.dataset.search = `${f.nom} ${f.telephone||''} ${f.adresse||''}`.toLowerCase();
            tr.innerHTML = `
                <td><span style="color:#aaa;font-size:0.8rem;">#${f.id}</span></td>
                <td><b>${f.nom}</b></td>
                <td>${f.telephone || '<span style="color:#ccc;">—</span>'}</td>
                <td>${f.adresse || '<span style="color:#ccc;">—</span>'}</td>
                <td>
                    <button class="btn-icon btn-edit me-1" onclick="editFournisseur(${f.id})" title="Modifier"><i class="bi bi-pencil-fill"></i></button>
                    <button class="btn-icon btn-del" onclick="deleteFournisseur(${f.id})" title="Supprimer"><i class="bi bi-trash-fill"></i></button>
                </td>`;
            tbody.appendChild(tr);
        });
    });
}

document.getElementById('fournisseurForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const form = e.target;
    const data = Object.fromEntries(new FormData(form));
    let url = '/api/fournisseurs/', method = 'POST';
    if(form.dataset.editId) { url += form.dataset.editId + '/'; method = 'PUT'; delete form.dataset.editId; }
    fetch(url, { method, headers: {'Content-Type':'application/json','X-CSRFToken':getCSRFToken()}, body: JSON.stringify(data) })
    .then(() => { loadFournisseurs(); form.reset(); bootstrap.Modal.getInstance(document.getElementById('fournisseurModal')).hide(); });
});

function editFournisseur(id) {
    const f = allFournisseurs.find(x => x.id === id);
    if(!f) return;
    const form = document.getElementById('fournisseurForm');
    form.nom.value = f.nom;
    form.telephone.value = f.telephone || '';
    form.adresse.value = f.adresse || '';
    form.dataset.editId = id;
    document.getElementById('modalTitle').innerText = 'Modifier fournisseur';
    new bootstrap.Modal(document.getElementById('fournisseurModal')).show();
}

function deleteFournisseur(id) {
    if(!confirm('Supprimer ce fournisseur ?')) return;
    fetch(`/api/fournisseurs/${id}/`, { method:'DELETE', headers:{'X-CSRFToken':getCSRFToken()} })
    .then(() => loadFournisseurs());
}

document.getElementById('fournisseurModal').addEventListener('hidden.bs.modal', () => {
    document.getElementById('fournisseurForm').reset();
    delete document.getElementById('fournisseurForm').dataset.editId;
    document.getElementById('modalTitle').innerText = 'Nouveau fournisseur';
});

loadFournisseurs();
</script>
{% endblock %}
