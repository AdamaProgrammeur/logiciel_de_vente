{% extends "frontend_app/base.html" %}
{% block title %}Paiements{% endblock %}

{% block content %}
<style>
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.page-header h2 { font-weight:700; color:#1e3c72; margin:0; }
.search-box { position:relative; }
.search-box input { padding-left:38px; border-radius:20px; border:1px solid #dee2e6; width:240px; height:38px; font-size:0.88rem; }
.search-box i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#aaa; }
.btn-add { background:linear-gradient(135deg,#1e3c72,#2a5298); color:white; border:none; border-radius:10px; padding:8px 18px; font-size:0.88rem; display:flex; align-items:center; gap:6px; transition:0.2s; }
.btn-add:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(30,60,114,0.3); color:white; }
.table-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.07); overflow:hidden; }
.table-card thead th { background:#1e3c72; color:white; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px; padding:12px 16px; border:none; }
.table-card tbody td { padding:11px 16px; vertical-align:middle; font-size:0.88rem; border-bottom:1px solid #f0f0f0; }
.table-card tbody tr:hover { background:#f8f9ff; }
.table-card tbody tr:last-child td { border-bottom:none; }
.btn-icon { width:32px; height:32px; border-radius:8px; border:none; display:inline-flex; align-items:center; justify-content:center; font-size:0.85rem; transition:0.2s; cursor:pointer; }
.btn-icon:hover { transform:scale(1.1); }
.btn-del { background:#fde8e8; color:#c0392b; }
.btn-del:hover { background:#e74c3c; color:white; }
.methode-badge { padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; background:#e0e7ff; color:#3730a3; }
.empty-row td { text-align:center; padding:30px; color:#aaa; font-size:0.9rem; }
</style>

<div class="page-header">
    <h2><i class="bi bi-wallet2 me-2" style="color:#2a5298;"></i>Paiements</h2>
    <div class="d-flex gap-2 align-items-center flex-wrap">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher..." oninput="filterTable()">
        </div>
        <button class="btn-add" data-bs-toggle="modal" data-bs-target="#paiementModal">
            <i class="bi bi-plus-circle-fill"></i> Nouveau paiement
        </button>
    </div>
</div>

<div id="alert-container"></div>

<div class="table-card">
    <div style="overflow-x:auto;">
    <table class="table mb-0" style="min-width:650px;">
        <thead>
            <tr>
                <th>#</th>
                <th>Vente</th>
                <th>Client</th>
                <th>Montant</th>
                <th>Méthode</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="paiements-list"></tbody>
    </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="paiementModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:14px;border:none;">
      <div class="modal-header" style="background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;border-radius:14px 14px 0 0;">
        <h5 class="modal-title"><i class="bi bi-wallet2 me-2"></i>Nouveau paiement</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="paiementForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Vente</label>
            <select name="vente" class="form-control" id="venteSelect" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Montant</label>
            <input type="number" name="montant" class="form-control" required min="0" step="0.01" placeholder="0.00">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Méthode</label>
            <select name="methode" class="form-control">
                <option value="Espèces">Espèces</option>
                <option value="Mobile Money">Mobile Money</option>
                <option value="Virement">Virement</option>
                <option value="Chèque">Chèque</option>
            </select>
          </div>
          <button class="btn w-100" style="background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;border-radius:8px;">
            <i class="bi bi-check-circle me-1"></i> Enregistrer
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function getCSRFToken() {
    return document.cookie.split('; ').find(r => r.startsWith('csrftoken'))?.split('=')[1];
}

function showAlert(msg, type='success') {
    const c = document.getElementById('alert-container');
    c.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">
        ${msg}<button class="btn-close" data-bs-dismiss="alert"></button></div>`;
    setTimeout(() => c.innerHTML = '', 5000);
}

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#paiements-list tr[data-search]').forEach(r => {
        r.style.display = r.dataset.search.includes(q) ? '' : 'none';
    });
}

function loadPaiements() {
    fetch('/api/paiements/')
    .then(r => r.json())
    .then(data => {
        const tbody = document.getElementById('paiements-list');
        tbody.innerHTML = '';
        if(!data.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Aucun paiement trouvé</td></tr>'; return; }
        data.forEach(p => {
            const tr = document.createElement('tr');
            const date = p.date ? new Date(p.date).toLocaleString() : '—';
            tr.dataset.search = `${p.vente_info||''} ${p.client_nom||''} ${p.methode||''}`.toLowerCase();
            tr.innerHTML = `
                <td><span style="color:#aaa;font-size:0.8rem;">#${p.id}</span></td>
                <td>Vente #${p.vente}</td>
                <td>${p.client_nom || '—'}</td>
                <td><b>${parseFloat(p.montant).toLocaleString()}</b></td>
                <td><span class="methode-badge">${p.methode}</span></td>
                <td style="color:#888;font-size:0.82rem;">${date}</td>
                <td>
                    <button class="btn-icon btn-del" onclick="deletePaiement(${p.id})" title="Supprimer"><i class="bi bi-trash-fill"></i></button>
                </td>`;
            tbody.appendChild(tr);
        });
    });
}

function loadVentesSelect() {
    fetch('/api/ventes/')
    .then(r => r.json())
    .then(data => {
        const ventes = Array.isArray(data) ? data : (data.results || []);
        window._ventesMap = {};
        ventes.forEach(v => window._ventesMap[v.id] = v);
        const select = document.getElementById('venteSelect');
        select.innerHTML = '<option value="">-- Choisir une vente --</option>';
        ventes.forEach(v => {
            const client = v.client_nom || 'Anonyme';
            const reste = parseFloat(v.reste || 0);
            if(reste > 0)
                select.innerHTML += `<option value="${v.id}">Vente #${v.id} — ${client} (reste: ${reste.toLocaleString()})</option>`;
        });
        if(select.options.length === 1)
            select.innerHTML += '<option disabled>Aucune vente avec reste à payer</option>';
    });
}

document.getElementById('paiementForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));

    // Alerte montant dépassé
    const venteId = data.vente;
    const montant = parseFloat(data.montant);
    if (venteId && window._ventesMap && window._ventesMap[venteId]) {
        const reste = parseFloat(window._ventesMap[venteId].reste) || 0;
        if (montant > reste + 0.01) {
            showToast(`⚠️ Montant (${montant.toLocaleString()}) dépasse le reste à payer (${reste.toLocaleString()}) !`, 'warning');
            return;
        }
    }

    const res = await fetch('/api/paiements/', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-CSRFToken':getCSRFToken()},
        body: JSON.stringify(data)
    });
    const json = await res.json();
    if(!res.ok) { showAlert(JSON.stringify(json), 'danger'); return; }
    loadPaiements();
    loadVentesSelect();
    e.target.reset();
    bootstrap.Modal.getInstance(document.getElementById('paiementModal')).hide();
    showAlert('Paiement enregistré avec succès !');
});

function deletePaiement(id) {
    if(!confirm('Supprimer ce paiement ?')) return;
    fetch(`/api/paiements/${id}/`, { method:'DELETE', headers:{'X-CSRFToken':getCSRFToken()} })
    .then(() => { loadPaiements(); showAlert('Paiement supprimé.', 'warning'); });
}

loadPaiements();
loadVentesSelect();

document.getElementById('paiementModal').addEventListener('show.bs.modal', loadVentesSelect);
</script>
{% endblock %}
