{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte - Gestion Stock</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a5f);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
}
.card {
    width:100%; max-width:480px;
    background:#1e293b;
    border-radius:18px;
    padding:36px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    animation:fadeUp .5s ease;
}
@keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
}
.logo { text-align:center; margin-bottom:24px; }
.logo .icon { font-size:2.2rem; }
.logo h2 { color:white; font-weight:700; font-size:1.3rem; margin-top:8px; }
.logo p { color:#94a3b8; font-size:.82rem; margin-top:4px; }
.section-title {
    color:#3b82f6; font-size:.72rem; text-transform:uppercase;
    letter-spacing:1.2px; font-weight:700; margin:20px 0 12px;
    display:flex; align-items:center; gap:8px;
}
.section-title::after {
    content:''; flex:1; height:1px; background:#334155;
}
.form-label { color:#cbd5e1; font-size:.83rem; font-weight:600; margin-bottom:4px; }
.form-control {
    background:#0f172a; border:1px solid #334155;
    color:white; border-radius:8px; padding:9px 13px; font-size:.88rem;
}
.form-control:focus {
    background:#0f172a; color:white;
    border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.2);
}
.form-control::placeholder { color:#475569; }
.btn-submit {
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white; border:none; border-radius:8px;
    padding:11px; font-weight:600; font-size:.95rem;
    width:100%; transition:.2s; margin-top:8px;
}
.btn-submit:hover { opacity:.9; transform:translateY(-1px); }
.btn-login-link {
    background:transparent; border:1px solid #334155;
    color:#94a3b8; border-radius:8px; padding:10px;
    font-size:.88rem; width:100%; transition:.2s; margin-top:10px;
}
.btn-login-link:hover { border-color:#3b82f6; color:#60a5fa; }
.alert-err {
    background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3);
    color:#fca5a5; border-radius:8px; padding:10px 14px;
    font-size:.83rem; margin-top:14px; display:none;
}
.alert-ok {
    background:rgba(16,185,129,.15); border:1px solid rgba(16,185,129,.3);
    color:#6ee7b7; border-radius:8px; padding:10px 14px;
    font-size:.83rem; margin-top:14px; display:none;
}
</style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="icon">🏪</div>
        <h2>Créer mon compte</h2>
        <p>Inscrivez-vous et créez votre boutique</p>
    </div>

    <form id="registerForm">

        <!-- Infos boutique -->
        <div class="section-title"><i class="bi bi-shop"></i> Ma boutique</div>
        <div class="row g-2">
            <div class="col-12">
                <label class="form-label">Nom de la boutique *</label>
                <input type="text" class="form-control" name="boutique_nom" placeholder="Ex: Boutique Sylla" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Téléphone</label>
                <input type="text" class="form-control" name="boutique_telephone" placeholder="+224...">
            </div>
            <div class="col-md-6">
                <label class="form-label">Email boutique</label>
                <input type="email" class="form-control" name="boutique_email" placeholder="boutique@email.com">
            </div>
            <div class="col-12">
                <label class="form-label">Adresse</label>
                <input type="text" class="form-control" name="boutique_adresse" placeholder="Adresse de la boutique">
            </div>
        </div>

        <!-- Infos compte -->
        <div class="section-title"><i class="bi bi-person-circle"></i> Mon compte admin</div>
        <div class="row g-2">
            <div class="col-md-6">
                <label class="form-label">Nom d'utilisateur *</label>
                <input type="text" class="form-control" name="username" placeholder="admin123" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" name="email" placeholder="vous@email.com" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Mot de passe *</label>
                <input type="password" class="form-control" name="password1" placeholder="••••••••" required minlength="6">
            </div>
            <div class="col-md-6">
                <label class="form-label">Confirmer *</label>
                <input type="password" class="form-control" name="password2" placeholder="••••••••" required minlength="6">
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <i class="bi bi-check-circle me-2"></i>Créer mon compte
        </button>

        <div class="alert-err" id="errMsg"></div>
        <div class="alert-ok"  id="okMsg"></div>
    </form>

    <a href="/" style="text-decoration:none;">
        <button class="btn-login-link">
            <i class="bi bi-arrow-left me-2"></i>Déjà un compte ? Se connecter
        </button>
    </a>
</div>

<script>
function getCookie(name) {
    return document.cookie.split(';').map(c => c.trim())
        .find(c => c.startsWith(name+'='))?.split('=')[1] || '';
}

document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const err = document.getElementById('errMsg');
    const ok  = document.getElementById('okMsg');
    err.style.display = 'none';
    ok.style.display  = 'none';

    const data = Object.fromEntries(new FormData(this));

    if(data.password1 !== data.password2) {
        err.style.display = 'block';
        err.innerText = 'Les mots de passe ne correspondent pas.';
        return;
    }

    const res = await fetch('/api/register/', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
        body: JSON.stringify(data)
    });
    const json = await res.json();

    if(res.ok && json.success) {
        ok.style.display = 'block';
        ok.innerText = '✅ Compte créé ! En attente d\'approbation...';
        setTimeout(() => window.location.href = json.redirect_url || '/non-approuvee/', 1500);
    } else {
        err.style.display = 'block';
        err.innerText = json.error || 'Erreur lors de la création du compte.';
    }
});
</script>
</body>
</html>
