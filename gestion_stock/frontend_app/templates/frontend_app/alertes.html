{% extends "frontend_app/base.html" %}
{% load static %}
{% block title %}Alertes Stock{% endblock %}

{% block content %}
<style>
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.page-header h2 { font-weight:700; color:#1e3c72; margin:0; }

.summary-cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.sum-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.07); padding:18px 16px; display:flex; align-items:center; gap:14px; }
.sum-card .ic { width:46px; height:46px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
.sum-card .info .val { font-size:1.5rem; font-weight:700; }
.sum-card .info .lbl { font-size:.75rem; color:#94a3b8; text-transform:uppercase; letter-spacing:.5px; }

.filter-tabs { display:flex; gap:8px; margin-bottom:16px; }
.ftab { background:#f1f5f9; border:none; border-radius:20px; padding:6px 16px; font-size:.82rem; font-weight:600; color:#475569; cursor:pointer; transition:.2s; }
.ftab.active { color:white; }

.table-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.07); overflow:hidden; }
.table-card thead th { background:#1e3c72; color:white; font-size:.78rem; text-transform:uppercase; letter-spacing:.5px; padding:12px 16px; border:none; }
.table-card tbody td { padding:11px 16px; vertical-align:middle; font-size:.88rem; border-bottom:1px solid #f0f0f0; }
.table-card tbody tr:hover { background:#fff8f8; }
.table-card tbody tr:last-child td { border-bottom:none; }

.badge-statut { padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:700; }
.badge-rupture { background:#fee2e2; color:#991b1b; }
.badge-faible { background:#fef3c7; color:#92400e; }

.stock-bar-wrap { display:flex; align-items:center; gap:8px; }
.stock-bar { height:6px; border-radius:3px; background:#f1f5f9; flex:1; overflow:hidden; }
.stock-bar-fill { height:100%; border-radius:3px; transition:.4s; }

.empty-row td { text-align:center; padding:40px; color:#aaa; font-size:.9rem; }
</style>

<div class="page-header">
    <h2><i class="bi bi-exclamation-triangle-fill me-2" style="color:#dc2626;"></i>Alertes Stock</h2>
    <button class="btn" style="background:#f1f5f9;color:#475569;border-radius:10px;font-size:.85rem;" onclick="loadAlertes()">
        <i class="bi bi-arrow-clockwise me-1"></i> Actualiser
    </button>
</div>

<!-- Résumé -->
<div class="summary-cards">
    <div class="sum-card">
        <div class="ic" style="background:#fee2e2;color:#dc2626;"><i class="bi bi-x-circle-fill"></i></div>
        <div class="info">
            <div class="val" id="nbRupture" style="color:#dc2626;">—</div>
            <div class="lbl">Rupture de stock</div>
        </div>
    </div>
    <div class="sum-card">
        <div class="ic" style="background:#fef3c7;color:#d97706;"><i class="bi bi-exclamation-circle-fill"></i></div>
        <div class="info">
            <div class="val" id="nbFaible" style="color:#d97706;">—</div>
            <div class="lbl">Stock faible</div>
        </div>
    </div>
    <div class="sum-card">
        <div class="ic" style="background:#dbeafe;color:#2563eb;"><i class="bi bi-box-seam-fill"></i></div>
        <div class="info">
            <div class="val" id="nbTotal" style="color:#2563eb;">—</div>
            <div class="lbl">Total en alerte</div>
        </div>
    </div>
</div>

<!-- Filtres -->
<div class="filter-tabs">
    <button class="ftab active" style="background:#475569;" onclick="filtrer('tous', this)">Tous</button>
    <button class="ftab" onclick="filtrer('rupture', this)">Rupture</button>
    <button class="ftab" onclick="filtrer('faible', this)">Stock faible</button>
</div>

<!-- Tableau -->
<div class="table-card">
    <div style="overflow-x:auto;">
    <table class="table mb-0" style="min-width:600px;">
        <thead>
            <tr>
                <th>#</th>
                <th>Produit</th>
                <th>Catégorie</th>
                <th>Stock actuel</th>
                <th>Seuil alerte</th>
                <th>Statut</th>
                <th>Prix</th>
            </tr>
        </thead>
        <tbody id="alertes-list"></tbody>
    </table>
    </div>
</div>

<script>
let allAlertes = [];
let filtreActif = 'tous';

function fmt(n) {
    return Number(n).toLocaleString('fr-FR') + ' FCFA';
}

function loadAlertes() {
    fetch('/api/alertes/').then(r => r.json()).then(data => {
        allAlertes = data.produits;
        const nbRupture = allAlertes.filter(p => p.statut === 'rupture').length;
        const nbFaible  = allAlertes.filter(p => p.statut === 'faible').length;
        document.getElementById('nbRupture').textContent = nbRupture;
        document.getElementById('nbFaible').textContent  = nbFaible;
        document.getElementById('nbTotal').textContent   = data.count;
        renderAlertes();
    });
}

function filtrer(type, btn) {
    filtreActif = type;
    document.querySelectorAll('.ftab').forEach(b => {
        b.classList.remove('active');
        b.style.background = '';
        b.style.color = '';
    });
    btn.classList.add('active');
    if (type === 'rupture') { btn.style.background = '#dc2626'; btn.style.color = 'white'; }
    else if (type === 'faible') { btn.style.background = '#d97706'; btn.style.color = 'white'; }
    else { btn.style.background = '#475569'; btn.style.color = 'white'; }
    renderAlertes();
}

function renderAlertes() {
    const list = filtreActif === 'tous' ? allAlertes : allAlertes.filter(p => p.statut === filtreActif);
    const tbody = document.getElementById('alertes-list');
    if (!list.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7"><i class="bi bi-check-circle me-2" style="color:#16a34a;"></i>Aucune alerte pour ce filtre</td></tr>';
        return;
    }
    tbody.innerHTML = list.map(p => {
        const pct = p.seuil_alerte > 0 ? Math.min((p.stock_actuelle / p.seuil_alerte) * 100, 100) : 0;
        const barColor = p.statut === 'rupture' ? '#dc2626' : '#d97706';
        const badge = p.statut === 'rupture'
            ? '<span class="badge-statut badge-rupture"><i class="bi bi-x-circle me-1"></i>Rupture</span>'
            : '<span class="badge-statut badge-faible"><i class="bi bi-exclamation-circle me-1"></i>Stock faible</span>';
        return `<tr>
            <td><span style="color:#aaa;font-size:.8rem;">#${p.id}</span></td>
            <td><b>${p.nom}</b></td>
            <td>${p.categorie || '<span style="color:#ccc;">—</span>'}</td>
            <td>
                <div class="stock-bar-wrap">
                    <span style="font-weight:700;color:${barColor};">${p.stock_actuelle}</span>
                    <div class="stock-bar">
                        <div class="stock-bar-fill" style="width:${pct}%;background:${barColor};"></div>
                    </div>
                </div>
            </td>
            <td>${p.seuil_alerte}</td>
            <td>${badge}</td>
            <td>${fmt(p.prix)}</td>
        </tr>`;
    }).join('');
}

loadAlertes();
</script>
{% endblock %}
