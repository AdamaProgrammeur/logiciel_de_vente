{% extends "frontend_app/base.html" %}
{% load static %}
{% block title %}Produits{% endblock %}

{% block content %}
<style>
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.page-header h2 { font-weight:700; color:#1e3c72; margin:0; }
.search-box { position:relative; }
.search-box input { padding-left:38px; border-radius:20px; border:1px solid #dee2e6; width:240px; height:38px; font-size:0.88rem; }
.search-box i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#aaa; }
.btn-add { background:linear-gradient(135deg,#1e3c72,#2a5298); color:white; border:none; border-radius:10px; padding:8px 18px; font-size:0.88rem; display:flex; align-items:center; gap:6px; transition:0.2s; }
.btn-add:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(30,60,114,0.3); color:white; }
.table-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.07); overflow:hidden; }
.table-card thead th { background:#1e3c72; color:white; font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px; padding:12px 16px; border:none; }
.table-card tbody td { padding:11px 16px; vertical-align:middle; font-size:0.88rem; border-bottom:1px solid #f0f0f0; }
.table-card tbody tr:hover { background:#f8f9ff; }
.table-card tbody tr:last-child td { border-bottom:none; }
.btn-icon { width:32px; height:32px; border-radius:8px; border:none; display:inline-flex; align-items:center; justify-content:center; font-size:0.85rem; transition:0.2s; cursor:pointer; }
.btn-icon:hover { transform:scale(1.1); }
.btn-edit { background:#fff3cd; color:#856404; }
.btn-edit:hover { background:#ffc107; color:white; }
.btn-del { background:#fde8e8; color:#c0392b; }
.btn-del:hover { background:#e74c3c; color:white; }
.stock-badge { padding:3px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
.stock-ok { background:#d1fae5; color:#065f46; }
.stock-low { background:#fef3c7; color:#92400e; }
.stock-out { background:#fee2e2; color:#991b1b; }
.empty-row td { text-align:center; padding:30px; color:#aaa; font-size:0.9rem; }
</style>

<div class="page-header">
    <h2><i class="bi bi-box-seam me-2" style="color:#2a5298;"></i>Produits</h2>
    <div class="d-flex gap-2 align-items-center flex-wrap">
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" placeholder="Rechercher un produit..." oninput="filterTable()">
        </div>
        <button class="btn-add" data-bs-toggle="modal" data-bs-target="#produitModal">
            <i class="bi bi-box-seam"></i> Nouveau produit
        </button>
    </div>
</div>

<div class="table-card">
    <div class="table-responsive-wrap">
    <table class="table mb-0" style="min-width:650px;">
        <thead><tr><th>#</th><th>Nom</th><th>Catégorie</th><th>Stock</th><th>Prix</th><th>Seuil alerte</th><th>Actions</th></tr></thead>
        <tbody id="produits-list"></tbody>
    </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="produitModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:14px;border:none;">
      <div class="modal-header" style="background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;border-radius:14px 14px 0 0;">
        <h5 class="modal-title"><i class="bi bi-box-seam me-2"></i><span id="modalTitle">Nouveau produit</span></h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="produitForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nom</label>
            <input type="text" class="form-control" name="nom" required placeholder="Nom du produit">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Catégorie</label>
            <select class="form-control" name="categorie" id="produitCategorie" required>
              <option value="">-- Sélectionner --</option>
            </select>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label fw-semibold">Stock initial</label>
              <input type="number" class="form-control" name="stock_actuelle" required min="0">
            </div>
            <div class="col-6 mb-3">
              <label class="form-label fw-semibold">Prix</label>
              <input type="number" class="form-control" name="prix" required min="0" step="0.01">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Seuil d'alerte</label>
            <input type="number" class="form-control" name="seuil_alerte" required min="0">
          </div>
          <button type="submit" class="btn w-100" style="background:linear-gradient(135deg,#1e3c72,#2a5298);color:white;border-radius:8px;">
            <i class="bi bi-check-circle me-1"></i> Enregistrer
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
let allProduits = [];

function getCSRFToken() {
    return document.cookie.split('; ').find(r => r.startsWith('csrftoken'))?.split('=')[1];
}

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#produits-list tr[data-search]').forEach(r => {
        r.style.display = r.dataset.search.includes(q) ? '' : 'none';
    });
}

function loadCategoriesSelect() {
    fetch('/api/categories/')
    .then(r => r.json())
    .then(data => {
        const select = document.getElementById('produitCategorie');
        select.innerHTML = '<option value="">-- Sélectionner --</option>';
        data.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nom}</option>`);
    });
}

function loadProduits() {
    fetch('/api/produits/')
    .then(r => r.json())
    .then(data => {
        allProduits = data;
        const tbody = document.getElementById('produits-list');
        tbody.innerHTML = '';
        if(!data.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Aucun produit trouvé</td></tr>'; return; }
        data.forEach(p => {
            let stockClass = p.stock_actuelle <= 0 ? 'stock-out' : p.stock_actuelle <= p.seuil_alerte ? 'stock-low' : 'stock-ok';
            let stockLabel = p.stock_actuelle <= 0 ? 'Rupture' : p.stock_actuelle <= p.seuil_alerte ? 'Faible' : 'OK';
            const tr = document.createElement('tr');
            tr.dataset.search = `${p.nom} ${p.categorie||''}`.toLowerCase();
            tr.innerHTML = `
                <td><span style="color:#aaa;font-size:0.8rem;">#${p.id}</span></td>
                <td><b>${p.nom}</b></td>
                <td>${p.categorie_nom || '<span style="color:#ccc;">—</span>'}</td>
                <td><span class="stock-badge ${stockClass}">${p.stock_actuelle} — ${stockLabel}</span></td>
                <td>${parseFloat(p.prix).toLocaleString()} FCFA</td>
                <td>${p.seuil_alerte}</td>
                <td><div class="actions-cell">
                    <button class="btn-icon btn-edit" onclick="editProduit(${p.id})" title="Modifier"><i class="bi bi-pencil-fill"></i></button>
                    <button class="btn-icon btn-del" onclick="deleteProduit(${p.id})" title="Supprimer"><i class="bi bi-trash-fill"></i></button>
                </div></td>`;
            tbody.appendChild(tr);
        });
    });
}

document.getElementById('produitForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const form = e.target;
    const data = Object.fromEntries(new FormData(form));
    data.categorie_id = data.categorie;
    delete data.categorie;
    let url = '/api/produits/', method = 'POST';
    if(form.dataset.editId) { url += form.dataset.editId + '/'; method = 'PUT'; delete form.dataset.editId; }
    fetch(url, { method, headers: {'Content-Type':'application/json','X-CSRFToken':getCSRFToken()}, body: JSON.stringify(data) })
    .then(() => { loadProduits(); form.reset(); bootstrap.Modal.getInstance(document.getElementById('produitModal')).hide(); });
});

function editProduit(id) {
    const p = allProduits.find(x => x.id === id);
    if(!p) return;
    const form = document.getElementById('produitForm');
    form.nom.value = p.nom;
    form.stock_actuelle.value = p.stock_actuelle;
    form.prix.value = p.prix;
    form.seuil_alerte.value = p.seuil_alerte;
    form.categorie.value = p.categorie_id || '';
    form.dataset.editId = id;
    document.getElementById('modalTitle').innerText = 'Modifier produit';
    new bootstrap.Modal(document.getElementById('produitModal')).show();
}

function deleteProduit(id) {
    if(!confirm('Supprimer ce produit ?')) return;
    fetch(`/api/produits/${id}/`, { method:'DELETE', headers:{'X-CSRFToken':getCSRFToken()} })
    .then(() => loadProduits());
}

document.getElementById('produitModal').addEventListener('hidden.bs.modal', () => {
    document.getElementById('produitForm').reset();
    delete document.getElementById('produitForm').dataset.editId;
    document.getElementById('modalTitle').innerText = 'Nouveau produit';
});

loadCategoriesSelect();
loadProduits();
</script>
{% endblock %}
